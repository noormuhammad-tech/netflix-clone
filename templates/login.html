<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Sign In</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='assets/images/favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-body">

    <nav id="navbar" class="auth-nav">
        <a href="{{ url_for('index') }}">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix">
        </a>
    </nav>

    <div class="auth-bg"></div>

    <div class="auth-container">
        <div class="auth-box">
            <h1>Sign In</h1>

            <!-- Flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}" novalidate>

                <div class="form-group">
                    <input
                        type="email"
                        name="email"
                        id="email"
                        placeholder=" "
                        required
                        value="{{ request.form.get('email', '') }}"
                    >
                    <label for="email">Email Address</label>
                </div>

                <div class="form-group">
                    <input
                        type="password"
                        name="password"
                        id="password"
                        placeholder=" "
                        required
                    >
                    <label for="password">Password</label>
                </div>

                <button type="submit" class="auth-btn">Sign In</button>
            </form>

            <div class="auth-extras">
                <label class="remember-me">
                    <input type="checkbox" name="remember"> Remember me
                </label>
                <a href="#" class="forgot">Need help?</a>
            </div>

            <p class="auth-switch">
                New to Netflix? <a href="{{ url_for('signup') }}">Sign up now</a>
            </p>

            <p class="auth-disclaimer">
                This page is protected by Google reCAPTCHA to ensure you're not a robot.
            </p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
